services:
  postgres:
    image: postgres:16
    container_name: telco-postgres
    environment:
      POSTGRES_DB: telco_ticket_db
      POSTGRES_USER: telco
      POSTGRES_PASSWORD: telco123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: